<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo DIOS 💖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:white;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

section{
display:none;
padding:20px;
width:100%;
max-width:400px;
}

.active{display:block}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:15px;
background:#ff2e63;
color:white;
}

#menu button{
background:#111;
border:1px solid #ff2e63
}

#map{
height:250px;
border-radius:15px;
margin:20px
}

#heart{font-size:70px;cursor:pointer}
#slider{width:80%}

/* overlay */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:.5s;
}

/* puzzle */
#puzzle{
width:300px;
height:300px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}
.piece{
width:100%;
height:100%;
background-image:url('tu_foto.jpg');
background-size:300px 300px;
}

/* corazones */
.heartFloat{
position:fixed;
color:#ff2e63;
font-size:20px;
animation:float 2s linear;
}
@keyframes float{
to{transform:translateY(-200px);opacity:0}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<!-- MENU -->
<section id="menu" class="active">
<h1>💖 Para Ti</h1>
<button onclick="showDay(1)">Día 1</button>
<button onclick="showDay(2)">Día 2</button>
<button onclick="showDay(3)">Día 3</button>
<button onclick="showDay(4)">Día 4</button>
<button onclick="showDay(5)">Día 5</button>
<button onclick="showDay(6)">Día 6</button>
<button onclick="showDay(7)">Día 7</button>
</section>

<!-- DIA 1 -->
<section id="day1">
<h2>🌍 Aunque estemos lejos</h2>
<div id="map"></div>
<p id="distanceText"></p>
<button onclick="next('heartSec')">Ven conmigo</button>
<button onclick="goMenu()">⬅️</button>
</section>

<section id="heartSec">
<h2>💓 Tócame</h2>
<div id="heart">❤️</div>
<p id="count">0</p>
<p id="msgExtra"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 2 -->
<section id="day2">
<h2>💌 Día 2</h2>
<p>Te pienso todo el tiempo ❤️</p>
<button onclick="openSecret()">Ver más</button>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 3 -->
<section id="day3">
<h2>😏 Día 3</h2>
<p>No dejo de imaginarte...</p>
<button onclick="openSecret()">Quiero verte</button>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 4 -->
<section id="day4">
<h2>🔥 ¿Cuánto me deseas?</h2>
<input type="range" id="slider" min="0" max="100">
<p id="sliderText"></p>
<button id="openBtn" style="display:none;">Abrir</button>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 5 -->
<section id="day5">
<h2>🧩 Ármame…</h2>
<div id="puzzle"></div>
<p id="puzzleMsg"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 6 -->
<section id="day6">
<h2>💻 Cita conmigo</h2>
<button onclick="date('peli')">🍿</button>
<button onclick="date('cena')">🍔</button>
<button onclick="date('chat')">💬</button>
<p id="dateMsg"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- DIA 7 -->
<section id="day7">
<h2>🔐 Solo para ti</h2>
<input id="pass" placeholder="contraseña">
<button onclick="login()">Entrar</button>

<div id="gallery" style="display:none;">
<img src="foto1.jpg" width="200">
<img src="foto2.jpg" width="200">
<img src="foto3.jpg" width="200">
</div>

<p id="loginMsg"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- overlay -->
<div id="overlay">
<img src="tu_foto.jpg" style="width:260px;border-radius:20px;">
<p>si llegaste hasta aquí… es porque eres muy especial para mí ❤️</p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// música
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

// navegación
function showDay(n){hideAll();document.getElementById("day"+n).classList.add("active");}
function next(id){hideAll();document.getElementById(id).classList.add("active");}
function goMenu(){hideAll();document.getElementById("menu").classList.add("active");}
function hideAll(){document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));}

// MAPA
let city1=[24.78,-107.35];
let city2=[19.86,-100.82];
let map=L.map('map').setView(city1,5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker(city1).addTo(map);
L.marker(city2).addTo(map);
L.polyline([city1,city2],{color:'red'}).addTo(map);
let dist=Math.sqrt((city1[0]-city2[0])**2+(city1[1]-city2[1])**2)*111;
distanceText.innerText=`Estamos a ${Math.floor(dist)} km… pero te siento aquí ❤️`;

// MENSAJES
const messages = Array.from({length:200}, (_,i)=>{
if(i<50) return "me haces sonreír cada vez más ❤️";
if(i<100) return "me estás gustando demasiado 😏";
if(i<150) return "no dejo de imaginarte 🔥";
return "te deseo cada vez más 🔥";
});

// corazón
let clicks=0;
heart.onclick=(e)=>{
clicks++;
count.innerText=clicks;
msgExtra.innerText=messages[clicks-1] || "ya no tengo palabras… 😏🔥";

let h=document.createElement('div');
h.className='heartFloat';
h.innerText='❤️';
h.style.left=e.clientX+'px';
h.style.top=e.clientY+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);

if(clicks===200) msgExtra.innerText="si llegaste hasta aquí… es porque de verdad te importo ❤️";
if(clicks===201){
msgExtra.innerHTML=`🔥 ahora sí<br><button onclick="openSecret()">Abrir 😏</button>`;
}
};

// slider
slider.oninput=function(){
let v=this.value;
sliderText.innerText=v<50?"te estás soltando 😏":"ya no te controlas 🔥";
if(v==100) openBtn.style.display="block";
};
openBtn.onclick=openSecret;

// puzzle
let puzzle=document.getElementById("puzzle");
let pieces=[];
for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="piece";
d.draggable=true;
let x=(i%3)*-100;
let y=Math.floor(i/3)*-100;
d.style.backgroundPosition=`${x}px ${y}px`;
d.ondragstart=e=>e.dataTransfer.setData("i",i);
d.ondragover=e=>e.preventDefault();
d.ondrop=e=>{
let from=e.dataTransfer.getData("i");
let temp=pieces[from].style.backgroundPosition;
pieces[from].style.backgroundPosition=d.style.backgroundPosition;
d.style.backgroundPosition=temp;
checkPuzzle();
};
pieces.push(d);
puzzle.appendChild(d);
}

function checkPuzzle(){
let ok=true;
pieces.forEach((p,i)=>{
let x=(i%3)*-100+"px";
let y=Math.floor(i/3)*-100+"px";
if(p.style.backgroundPosition!==`${x} ${y}`) ok=false;
});
if(ok){puzzleMsg.innerText="lo lograste 😏🔥";openSecret();}
}

// cita
function date(t){
dateMsg.innerText=
t=="peli"?"3...2...1 🎬 imagíname contigo":
t=="cena"?"cenemos juntos ❤️":
"quédate conmigo 😏";
}

// login
function login(){
if(pass.value=="amor123"){
gallery.style.display="block";
loginMsg.innerText="acceso 😏";
}else loginMsg.innerText="no 😈";
}

// overlay
function openSecret(){
overlay.style.opacity=1;
overlay.style.pointerEvents="all";
}
overlay.onclick=()=>{
overlay.style.opacity=0;
overlay.style.pointerEvents="none";
}

</script>
</body>
</html>
