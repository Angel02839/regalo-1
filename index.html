<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:white;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

section{
display:none;
padding:20px;
width:100%;
max-width:400px;
animation:fade .5s;
}
.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:15px;
background:#ff2e63;
color:white;
}

#map{height:250px;border-radius:15px;margin:20px}
#heart{font-size:70px;cursor:pointer}

/* SLIDER PRO */
#slider{
width:80%;
height:12px;
border-radius:10px;
background:linear-gradient(to right,#ff2e63 0%, #333 0%);
}

/* puzzle */
#puzzle{
width:300px;height:300px;margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}
.piece{
width:100%;height:100%;
background-image:url('tu_foto.jpg');
background-size:300px 300px;
}

/* corazones */
.heartFloat{
position:fixed;
color:#ff2e63;
animation:float 2s linear;
}
@keyframes float{
to{transform:translateY(-200px);opacity:0}
}
</style>
