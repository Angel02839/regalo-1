<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo DIOS 💖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ========= DISEÑO GENERAL ========= */
body{
margin:0;
font-family:sans-serif;
background: radial-gradient(circle at top, #1a0010, #000);
color:white;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

section{
display:none;
padding:20px;
width:100%;
max-width:400px;
animation:fade .5s;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,0,100,0.2);
}
.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

h1,h2{
background: linear-gradient(45deg,#ff2e63,#ff6b81);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff2e63,#ff6b81);
color:white;
box-shadow:0 0 10px #ff2e63;
}

/* ========= ELEMENTOS ========= */
#map{height:250px;border-radius:15px;margin:20px}

#heart{
font-size:70px;
cursor:pointer;
text-shadow:0 0 15px #ff2e63;
}

#slider{
width:80%;
height:12px;
border-radius:10px;
background:linear-gradient(to right,#ff2e63 0%, #333 0%);
box-shadow:0 0 10px #ff2e63;
}

#hiddenPhoto{
display:none;
margin-top:15px;
}

.heartFloat{
position:fixed;
color:#ff2e63;
animation:float 2s linear;
}
@keyframes float{
to{transform:translateY(-200px);opacity:0}
}

</style>
</head>

<body>

<!-- ========= MENÚ ========= -->
<section id="menu" class="active">
<h1>💖 Para Ti</h1>
<button onclick="showDay(1)">Día 1</button>
<button onclick="showDay(2)">Día 2</button>
<button onclick="showDay(3)">Día 3</button>
<button onclick="showDay(4)">Día 4</button>
<button onclick="showDay(5)">Día 5</button>
<button onclick="showDay(6)">Día 6</button>
<button onclick="showDay(7)">Día 7</button>
</section>

<!-- ========= DÍA 1 ========= -->
<section id="day1">
<h2>🌍 Aunque estemos lejos</h2>
<div id="map"></div>
<p id="distanceText"></p>
<button onclick="next('heartSec')">Ven conmigo</button>
<button onclick="goMenu()">⬅️</button>
</section>

<section id="heartSec">
<h2>💓 Tócame</h2>
<div id="heart">❤️</div>
<p id="count">0</p>
<p id="msgExtra"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 2 ========= -->
<section id="day2">
<h2>💌 Día 2</h2>
<p id="day2text">Hay algo en ti que no puedo ignorar…</p>
<button onclick="day2More()">Seguir</button>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 3 ========= -->
<section id="day3">
<h2>😏 Día 3</h2>
<p id="day3text">No dejo de imaginarte…</p>
<button onclick="day3More()">Más</button>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 4 ========= -->
<section id="day4">
<h2>🔥 ¿Cuánto me deseas?</h2>

<input type="range" id="slider" min="0" max="100" value="0">
<p id="sliderText">empieza…</p>

<div id="hiddenPhoto">
<img src="foto_secreta.jpg" width="220">
<p>sabía que ibas a llegar hasta aquí 😏🔥</p>
</div>

<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 5 ========= -->
<section id="day5">
<h2>🧩 Ármame…</h2>
<div id="puzzle"></div>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 6 ========= -->
<section id="day6">
<h2>💻 Cita conmigo</h2>
<button onclick="date('peli')">🍿</button>
<button onclick="date('cena')">🍔</button>
<button onclick="date('chat')">💬</button>
<p id="dateMsg"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<!-- ========= DÍA 7 ========= -->
<section id="day7">
<h2>🔐 Solo para ti</h2>
<input id="pass">
<button onclick="login()">Entrar</button>

<div id="gallery" style="display:none;">
<img src="foto1.jpg" width="200">
</div>

<p id="loginMsg"></p>
<button onclick="goMenu()">⬅️</button>
</section>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ========= NAVEGACIÓN ========= */
function showDay(n){hideAll();document.getElementById("day"+n).classList.add("active");}
function next(id){hideAll();document.getElementById(id).classList.add("active");}
function goMenu(){hideAll();document.getElementById("menu").classList.add("active");}
function hideAll(){document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));}

/* ========= MAPA ========= */
let map=L.map('map').setView([24.78,-107.35],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
distanceText.innerText="aunque estemos lejos… ❤️";

/* ========= 200 MENSAJES ========= */
const messages = [];
for(let i=1;i<=200;i++){
messages.push(`pensamiento único #${i} contigo ❤️`);
}

/* ========= CORAZÓN ========= */
let clicks=0;
heart.onclick=(e)=>{
clicks++;
count.innerText=clicks;
msgExtra.innerText = messages[(clicks-1)%messages.length];

/* efecto */
let h=document.createElement('div');
h.className='heartFloat';
h.innerText='❤️';
h.style.left=e.clientX+'px';
h.style.top=e.clientY+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
};

/* ========= SLIDER ========= */
slider.oninput=function(){
let v=this.value;
this.style.background=`linear-gradient(to right,#ff2e63 ${v}%,#333 ${v}%)`;

sliderText.innerText=[
"empieza","ya empezó","se siente","te estás soltando",
"esto cambia","ya no es inocente","te gusta",
"ya no te controlas","🔥 intenso","casi","💥 máximo"
][Math.floor(v/10)];

if(v==100){
hiddenPhoto.style.display="block";
}
};

/* ========= LOGIN ========= */
function login(){
if(pass.value=="Noah Losano Villegas"){
gallery.style.display="block";
loginMsg.innerText="correcto ❤️";
}else loginMsg.innerText="piensa bien…";
}

</script>
</body>
</html>
