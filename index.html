<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 💖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:white;
text-align:center;
overflow:hidden;
}

/* secciones */
section{
display:none;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}
.active{display:flex}

/* botones */
button{
padding:15px;
margin:10px;
border:none;
border-radius:20px;
background:#ff2e63;
color:white;
width:80%;
max-width:300px;
}

/* corazón */
#heart{
font-size:70px;
animation:beat 1s infinite;
}
@keyframes beat{
50%{transform:scale(1.2)}
}

/* mapa */
#map{
height:250px;
width:90%;
border-radius:15px;
}

/* overlay */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:.5s;
}

#overlay img{
width:90%;
max-width:300px;
border-radius:20px;
}

/* slider */
#slider{width:90%}
</style>
</head>

<body>

<!-- DIA 1 -->
<section id="day1">
<h1>💌 Día 1</h1>
<p>Aquí escribe tu carta ❤️</p>
<button onclick="next('heartSec')">Sentirme</button>
</section>

<section id="heartSec">
<h2>💓 Tócame</h2>
<div id="heart">❤️</div>
<p id="count">0</p>
<p id="msg"></p>
<p id="extra"></p>
</section>

<!-- DIA 2 -->
<section id="day2">
<h1>🌍 Día 2</h1>
<div id="map"></div>
<p id="dist"></p>
<p>Aquí tu carta bonita 💌</p>
</section>

<!-- DIA 3 -->
<section id="day3">
<h1>😏 Día 3</h1>
<button onclick="openSecret()">Quiero verte</button>
</section>

<!-- DIA 4 -->
<section id="day4">
<h1>🔥 Día 4</h1>
<input type="range" id="slider" min="0" max="100">
<p id="sliderTxt"></p>
<button id="openBtn" style="display:none;">Abrir</button>
</section>

<!-- DIA 5 -->
<section id="day5">
<h1>🧩 Día 5</h1>
<p>Aquí puedes poner tu puzzle</p>
</section>

<!-- DIA 6 -->
<section id="day6">
<h1>💻 Día 6</h1>
<button onclick="date('peli')">🍿</button>
<button onclick="date('cena')">🍔</button>
<button onclick="date('chat')">💬</button>
<p id="dateMsg"></p>
</section>

<!-- DIA 7 -->
<section id="day7">
<h1>🔐 Día 7</h1>
<input id="pass" placeholder="contraseña">
<button onclick="login()">Entrar</button>
<p id="loginMsg"></p>
</section>

<!-- overlay -->
<div id="overlay">
<img src="tu_foto.jpg">
<p>solo tú 😏</p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 📅 SISTEMA 7 DÍAS
let start=localStorage.getItem("start");
if(!start){
start=Date.now();
localStorage.setItem("start",start);
}

function getDay(){
return Math.min(Math.floor((Date.now()-start)/(1000*60*60*24))+1,7);
}

window.onload=()=>{
let d=getDay();
show("day"+d);
}

// navegación
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function next(id){ show(id); }

// 💓 corazón
let c=0;
let heart=document.getElementById("heart");

heart.onclick=e=>{
c++;
document.getElementById("count").innerText=c;

let msg=c<70?"me encantas ❤️":c<140?"me provocas 😏":"te deseo 🔥";
document.getElementById("msg").innerText=msg;

if(c==200) document.getElementById("extra").innerText="dame uno más…";
if(c==201) openSecret();
}

// 🌍 mapa
let map=L.map('map').setView([24,-107],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 slider
let slider=document.getElementById("slider");
slider.oninput=()=>{
let v=slider.value;
document.getElementById("sliderTxt").innerText=
v<50?"te estás soltando 😏":"ya no te controlas 🔥";

if(v==100){
document.getElementById("openBtn").style.display="block";
}
}

// 💻 cita
function date(t){
document.getElementById("dateMsg").innerText=
t=="peli"?"3...2...1 🎬":
t=="cena"?"cenemos ❤️":
"quédate conmigo 😏";
}

// 🔐 login
function login(){
if(document.getElementById("pass").value=="amor"){
openSecret();
}else{
document.getElementById("loginMsg").innerText="no 😏";
}
}

// 💥 reveal
function openSecret(){
let o=document.getElementById("overlay");
o.style.opacity=1;
o.style.pointerEvents="all";
}

document.getElementById("openBtn").onclick=openSecret;

// cerrar
document.getElementById("overlay").onclick=function(){
this.style.opacity=0;
this.style.pointerEvents="none";
}

</script>

</body>
</html>
